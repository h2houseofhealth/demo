name: Deploy DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Validate deploy config
        run: |
          if [ -z "${{ vars.PAGES_DEV_REPO }}" ]; then
            echo "Missing repo variable: PAGES_DEV_REPO (expected format: owner/demo-dev)"
            exit 1
          fi
          if [ -z "${{ secrets.GH_PAGES_PAT }}" ]; then
            echo "Missing secret: GH_PAGES_PAT"
            exit 1
          fi
          echo "PAGES_DEV_REPO is set to: ${{ vars.PAGES_DEV_REPO }}"

      - name: Build DEV static page
        run: |
          mkdir -p ./dist
          cat > ./dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>DEV</title>
          </head>
          <body>
            <h1>This is from DEV</h1>
          </body>
          </html>
          EOF

      - name: Create CNAME (optional)
        if: ${{ vars.PAGES_DEV_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_DEV_DOMAIN }}" > ./dist/CNAME

      - name: Deploy to DEV Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_PAT }}
          external_repository: ${{ vars.PAGES_DEV_REPO }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
