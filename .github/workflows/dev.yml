name: Deploy DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Validate deploy config
        run: |
          if [ -z "${{ vars.PAGES_DEV_REPO }}" ]; then
            echo "Missing repo variable: PAGES_DEV_REPO (expected format: owner/demo-dev)"
            exit 1
          fi
          if [ -z "${{ secrets.GH_PAGES_PAT }}" ]; then
            echo "Missing secret: GH_PAGES_PAT"
            exit 1
          fi
          echo "Deploy target repo: ${{ vars.PAGES_DEV_REPO }}"

      - name: Normalize target repo value
        id: normalize_repo
        run: |
          set -euo pipefail
          RAW='${{ vars.PAGES_DEV_REPO }}'
          CLEAN="$(printf '%s' "$RAW" | tr -d '[:space:]')"
          CLEAN="${CLEAN#git@github.com:}"
          CLEAN="${CLEAN#ssh://git@github.com/}"
          CLEAN="${CLEAN#https://github.com/}"
          CLEAN="${CLEAN#http://github.com/}"
          CLEAN="${CLEAN#git://github.com/}"
          CLEAN="${CLEAN#github.com:}"
          CLEAN="${CLEAN#github.com/}"
          CLEAN="${CLEAN%.git}"
          CLEAN="${CLEAN%/}"
          while [[ "$CLEAN" == /* || "$CLEAN" == :* ]]; do
            CLEAN="${CLEAN#/}"
            CLEAN="${CLEAN#:}"
          done
          echo "PAGES_DEV_REPO(raw)   = '$RAW'"
          echo "PAGES_DEV_REPO(clean) = '$CLEAN'"
          if [[ ! "$CLEAN" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "PAGES_DEV_REPO format is invalid. Expected owner/repo"
            exit 1
          fi
          echo "repo=$CLEAN" >> "$GITHUB_OUTPUT"

      - name: Build DEV static page
        run: |
          mkdir -p ./dist
          cat > ./dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>DEV</title>
          </head>
          <body>
            <h1>This is from DEV</h1>
          </body>
          </html>
          EOF

      - name: Create CNAME (optional)
        if: ${{ vars.PAGES_DEV_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_DEV_DOMAIN }}" > ./dist/CNAME

      - name: Verify target repo access
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          TARGET_REPO='${{ steps.normalize_repo.outputs.repo }}'
          REMOTE_URL="https://github.com/${TARGET_REPO}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_PAGES_PAT" | base64 | tr -d '\n')"
          echo "Checking access to: ${REMOTE_URL}"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" ls-remote "${REMOTE_URL}" HEAD >/dev/null

      - name: Push dist to target gh-pages
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          TARGET_REPO='${{ steps.normalize_repo.outputs.repo }}'
          WORK_DIR="$(mktemp -d)"
          REMOTE_URL="https://github.com/${TARGET_REPO}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf 'x-access-token:%s' "$GH_PAGES_PAT" | base64 | tr -d '\n')"

          echo "Cloning: ${REMOTE_URL}"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" clone "${REMOTE_URL}" "$WORK_DIR"
          cd "$WORK_DIR"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch -c gh-pages --track origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Deploy DEV from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" push origin gh-pages --force
