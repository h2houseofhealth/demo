name: Deploy DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Validate deploy config
        run: |
          if [ -z "${{ vars.PAGES_DEV_REPO }}" ]; then
            echo "Missing repo variable: PAGES_DEV_REPO (expected format: owner/demo-dev)"
            exit 1
          fi
          if [ -z "${{ secrets.GH_PAGES_PAT }}" ]; then
            echo "Missing secret: GH_PAGES_PAT"
            exit 1
          fi
          echo "Deploy target repo: ${{ vars.PAGES_DEV_REPO }}"

      - name: Build DEV static page
        run: |
          mkdir -p ./dist
          cat > ./dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>DEV</title>
          </head>
          <body>
            <h1>This is from DEV</h1>
          </body>
          </html>
          EOF

      - name: Create CNAME (optional)
        if: ${{ vars.PAGES_DEV_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_DEV_DOMAIN }}" > ./dist/CNAME

      - name: Verify target repo access
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          git ls-remote "https://x-access-token:${GH_PAGES_PAT}@github.com/${{ vars.PAGES_DEV_REPO }}.git" HEAD >/dev/null

      - name: Push dist to target gh-pages
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          TARGET_REPO="${{ vars.PAGES_DEV_REPO }}"
          WORK_DIR="$(mktemp -d)"

          git clone "https://x-access-token:${GH_PAGES_PAT}@github.com/${TARGET_REPO}.git" "$WORK_DIR"
          cd "$WORK_DIR"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch -c gh-pages --track origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Deploy DEV from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin gh-pages --force
