name: Deploy DEV

on:
  push:
    branches:
      - dev
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-dev
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Validate deploy config
        run: |
          if [ -z "${{ vars.PAGES_DEV_REPO }}" ]; then
            echo "Missing repo variable: PAGES_DEV_REPO (expected format: owner/demo-dev)"
            exit 1
          fi
          if [ -z "${{ secrets.GH_PAGES_PAT }}" ]; then
            echo "Missing secret: GH_PAGES_PAT"
            exit 1
          fi
          echo "Deploy target repo: ${{ vars.PAGES_DEV_REPO }}"

      - name: Debug target repo value
        run: |
          set -euo pipefail
          RAW='${{ vars.PAGES_DEV_REPO }}'
          CLEAN="$(echo "$RAW" | tr -d '[:space:]')"
          CLEAN="${CLEAN#https://github.com/}"
          CLEAN="${CLEAN#http://github.com/}"
          CLEAN="${CLEAN#github.com/}"
          CLEAN="${CLEAN%.git}"
          CLEAN="${CLEAN#/}"
          echo "PAGES_DEV_REPO(raw)   = '$RAW'"
          echo "PAGES_DEV_REPO(clean) = '$CLEAN'"
          case "$CLEAN" in
            */*)
              echo "PAGES_DEV_REPO format looks valid (owner/repo)."
              ;;
            *)
              echo "PAGES_DEV_REPO format is invalid. Expected owner/repo"
              exit 1
              ;;
          esac

      - name: Build DEV static page
        run: |
          mkdir -p ./dist
          cat > ./dist/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>DEV</title>
          </head>
          <body>
            <h1>This is from DEV</h1>
          </body>
          </html>
          EOF

      - name: Create CNAME (optional)
        if: ${{ vars.PAGES_DEV_DOMAIN != '' }}
        run: echo "${{ vars.PAGES_DEV_DOMAIN }}" > ./dist/CNAME

      - name: Verify target repo access
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          TARGET_REPO='${{ vars.PAGES_DEV_REPO }}'
          TARGET_REPO="$(echo "$TARGET_REPO" | tr -d '[:space:]')"
          TARGET_REPO="${TARGET_REPO#https://github.com/}"
          TARGET_REPO="${TARGET_REPO#http://github.com/}"
          TARGET_REPO="${TARGET_REPO#github.com/}"
          TARGET_REPO="${TARGET_REPO%.git}"
          TARGET_REPO="${TARGET_REPO#/}"
          if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid target repo after normalization: '$TARGET_REPO'"
            exit 1
          fi
          git ls-remote "https://x-access-token:${GH_PAGES_PAT}@github.com/${TARGET_REPO}.git" HEAD >/dev/null

      - name: Push dist to target gh-pages
        env:
          GH_PAGES_PAT: ${{ secrets.GH_PAGES_PAT }}
        run: |
          set -euo pipefail
          TARGET_REPO='${{ vars.PAGES_DEV_REPO }}'
          TARGET_REPO="$(echo "$TARGET_REPO" | tr -d '[:space:]')"
          TARGET_REPO="${TARGET_REPO#https://github.com/}"
          TARGET_REPO="${TARGET_REPO#http://github.com/}"
          TARGET_REPO="${TARGET_REPO#github.com/}"
          TARGET_REPO="${TARGET_REPO%.git}"
          TARGET_REPO="${TARGET_REPO#/}"
          if [[ ! "$TARGET_REPO" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid target repo after normalization: '$TARGET_REPO'"
            exit 1
          fi
          WORK_DIR="$(mktemp -d)"

          git clone "https://x-access-token:${GH_PAGES_PAT}@github.com/${TARGET_REPO}.git" "$WORK_DIR"
          cd "$WORK_DIR"

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git switch -c gh-pages --track origin/gh-pages
          else
            git switch --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE/dist/." .

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "Deploy DEV from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin gh-pages --force
