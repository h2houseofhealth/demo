name: Deploy TEST

on:
  push:
    branches:
      - test
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-test
      cancel-in-progress: true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Validate deploy config
        run: |
          test -n "${{ vars.PAGES_TEST_REPO }}" || (echo "Missing repo variable PAGES_TEST_REPO (format: owner/repo)" && exit 1)
          test -n "${{ secrets.GH_PAGES_PAT }}" || (echo "Missing secret GH_PAGES_PAT" && exit 1)

      - name: Create CNAME
        run: echo "test.demo.h2houseofhealth.com" > ./CNAME

      - name: Deploy to TEST Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAGES_PAT }}
          external_repository: ${{ vars.PAGES_TEST_REPO }}
          publish_branch: gh-pages
          publish_dir: .
          force_orphan: true
